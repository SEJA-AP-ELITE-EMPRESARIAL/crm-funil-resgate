# Nginx do container frontend do CRM.
# Serve a SPA e faz proxy de /api, /admin e /static para o backend (gunicorn).
# Mesma origem → sem CORS. TLS é terminado no nginx do HOST.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Importação de Excel etc.
    client_max_body_size 25M;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # API + admin + estáticos do Django → backend
    location ~ ^/(api|admin|static)/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Preserva o protocolo original vindo do nginx do host (https).
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA — qualquer rota cai no index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash podem ser cacheados agressivamente
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
