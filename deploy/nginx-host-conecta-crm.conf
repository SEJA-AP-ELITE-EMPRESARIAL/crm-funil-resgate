# =============================================================================
# Nginx do HOST (origin) — Conecta_CRM
# =============================================================================
# Espelha o conecta.conf: termina TLS com Cloudflare Origin Certificate e faz
# proxy para o container frontend do CRM (127.0.0.1:8090).
#
# Instalar na VPS em /etc/nginx/sites-available/conecta-crm.conf (symlink em
# sites-enabled/). Reutiliza o mesmo cert origin se ele cobrir *.sejaap.com.br;
# senão, gere um Origin Certificate para o subdomínio no painel Cloudflare.
#
# HOMOLOG: troque os dois server_name para conecta-crm-homolog.sejaap.com.br.
# =============================================================================

# HTTP -> HTTPS
server {
    listen 80;
    server_name conecta-crm.sejaap.com.br;
    return 301 https://conecta-crm.sejaap.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    server_name conecta-crm.sejaap.com.br;

    # --- TLS (Cloudflare Origin Certificate) ---
    ssl_certificate     /opt/conecta/secrets/cf-origin.pem;
    ssl_certificate_key /opt/conecta/secrets/cf-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Uploads (importação de Excel)
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        # Host real preservado p/ ALLOWED_HOSTS / CSRF do Django
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        # Headers da Cloudflare
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray           $http_cf_ray;

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_buffering off;
    }
}
