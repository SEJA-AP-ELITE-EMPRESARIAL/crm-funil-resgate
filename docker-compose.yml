# Conecta_CRM — stack isolada (backend Django + frontend nginx), fala com o Supabase.
# Roda na VPS do Conecta, atrás do nginx do HOST (que termina o TLS).
#   docker compose up -d --build
name: conecta-crm

services:
  backend:
    build: ./backend
    container_name: conecta-crm-backend
    env_file: .env
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/crm/config/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: conecta-crm-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      # Exposto só no loopback; o nginx do HOST faz o proxy do subdomínio para cá.
      - "127.0.0.1:8090:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
